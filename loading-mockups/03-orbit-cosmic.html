<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Loading — Orbit Cosmic</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #0f172a;
    font-family: system-ui, -apple-system, sans-serif;
    overflow: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse at 50% 50%, rgba(37,99,235,0.08), transparent 60%),
      radial-gradient(ellipse at 80% 20%, rgba(96,165,250,0.05), transparent 40%),
      radial-gradient(ellipse at 20% 80%, rgba(37,99,235,0.05), transparent 40%);
    pointer-events: none;
  }

  .loader {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 36px;
    position: relative;
  }

  .cosmic-ring {
    position: relative;
    width: 140px;
    height: 140px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .orbit {
    position: absolute;
    border-radius: 50%;
    border: 1px solid transparent;
  }

  .orbit-1 {
    inset: 0;
    border-color: rgba(37, 99, 235, 0.15);
    animation: spin 4s linear infinite;
  }

  .orbit-2 {
    inset: 12px;
    border-color: rgba(96, 165, 250, 0.1);
    animation: spin 3s linear infinite reverse;
  }

  .orbit-3 {
    inset: 24px;
    border-color: rgba(37, 99, 235, 0.08);
    animation: spin 5s linear infinite;
  }

  .satellite {
    position: absolute;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    top: -4px;
    left: 50%;
    margin-left: -4px;
  }

  .sat-1 {
    background: #60a5fa;
    box-shadow: 0 0 16px rgba(96, 165, 250, 0.6);
  }
  .sat-2 {
    background: #2563eb;
    width: 6px; height: 6px;
    margin-left: -3px;
    box-shadow: 0 0 12px rgba(37, 99, 235, 0.5);
  }
  .sat-3 {
    background: #93c5fd;
    width: 10px; height: 10px;
    margin-left: -5px;
    box-shadow: 0 0 20px rgba(147, 197, 253, 0.4);
  }

  .sat-1 { top: -4px; }
  .sat-2 { top: -3px; }
  .sat-3 { top: -5px; }

  .core {
    width: 56px;
    height: 56px;
    border-radius: 50%;
    background: radial-gradient(circle at 40% 40%, #2563eb, #1d4ed8);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    font-weight: 700;
    color: #fff;
    letter-spacing: -1px;
    z-index: 2;
    box-shadow: 0 0 40px rgba(37, 99, 235, 0.3);
    animation: corePulse 2s ease-in-out infinite;
  }

  .core-ring {
    position: absolute;
    width: 64px;
    height: 64px;
    border-radius: 50%;
    border: 2px solid rgba(37, 99, 235, 0.3);
    animation: ringExpand 2s ease-out infinite;
  }

  .particles {
    position: absolute;
    width: 200px;
    height: 200px;
    top: -30px;
    left: -30px;
  }

  .particle {
    position: absolute;
    width: 3px;
    height: 3px;
    background: #60a5fa;
    border-radius: 50%;
    opacity: 0;
  }
  .particle:nth-child(1) { animation: particleDrift 3s ease-in-out infinite; top: 20%; left: 10%; }
  .particle:nth-child(2) { animation: particleDrift 4s ease-in-out infinite 0.5s; top: 60%; left: 80%; }
  .particle:nth-child(3) { animation: particleDrift 3.5s ease-in-out infinite 1s; top: 80%; left: 30%; }
  .particle:nth-child(4) { animation: particleDrift 2.8s ease-in-out infinite 1.5s; top: 30%; left: 70%; }
  .particle:nth-child(5) { animation: particleDrift 4.2s ease-in-out infinite 0.3s; top: 50%; left: 50%; }
  .particle:nth-child(6) { animation: particleDrift 3.2s ease-in-out infinite 0.8s; top: 70%; left: 15%; }
  .particle:nth-child(7) { animation: particleDrift 3.8s ease-in-out infinite 1.2s; top: 15%; left: 55%; }
  .particle:nth-child(8) { animation: particleDrift 2.5s ease-in-out infinite 1.8s; top: 85%; left: 65%; }

  .status {
    color: #64748b;
    font-size: 13px;
    letter-spacing: 3px;
    text-transform: uppercase;
    font-weight: 500;
  }

  .status span {
    display: inline-block;
    animation: statusBlink 1.6s steps(1) infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  @keyframes corePulse {
    0%, 100% { transform: scale(1); box-shadow: 0 0 40px rgba(37, 99, 235, 0.3); }
    50% { transform: scale(1.06); box-shadow: 0 0 60px rgba(37, 99, 235, 0.5); }
  }

  @keyframes ringExpand {
    0% { transform: scale(0.8); opacity: 0.6; }
    100% { transform: scale(2); opacity: 0; }
  }

  @keyframes particleDrift {
    0%, 100% { opacity: 0; transform: translate(0, 0); }
    25% { opacity: 1; }
    50% { opacity: 1; transform: translate(20px, -20px); }
    75% { opacity: 0.5; }
  }

  @keyframes statusBlink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }
</style>
</head>
<body>
  <div class="loader">
    <div class="cosmic-ring">
      <div class="particles">
        <span class="particle"></span><span class="particle"></span>
        <span class="particle"></span><span class="particle"></span>
        <span class="particle"></span><span class="particle"></span>
        <span class="particle"></span><span class="particle"></span>
      </div>
      <div class="orbit orbit-1"><span class="satellite sat-1"></span></div>
      <div class="orbit orbit-2"><span class="satellite sat-2"></span></div>
      <div class="orbit orbit-3"><span class="satellite sat-3"></span></div>
      <div class="core-ring"></div>
      <div class="core">K</div>
    </div>
    <div class="status">
      SYNCHRONIZING <span>...</span>
    </div>
  </div>
</body>
</html>
