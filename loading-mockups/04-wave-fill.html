<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Loading — Wave Fill</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #0f172a;
    font-family: system-ui, -apple-system, sans-serif;
    overflow: hidden;
  }

  .loader {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 32px;
    position: relative;
  }

  .wave-box {
    position: relative;
    width: 120px;
    height: 120px;
    border-radius: 24px;
    border: 2px solid rgba(37, 99, 235, 0.2);
    overflow: hidden;
    background: rgba(37, 99, 235, 0.03);
  }

  .wave-fill {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 0%;
    background: linear-gradient(to top, #2563eb, #60a5fa);
    animation: fillUp 3s ease-in-out infinite;
    border-radius: 0 0 22px 22px;
  }

  .wave-surface {
    position: absolute;
    top: -8px;
    left: -20%;
    width: 140%;
    height: 20px;
    background: radial-gradient(ellipse at 50% 0%, rgba(96, 165, 250, 0.5), transparent);
    animation: waveRipple 2s ease-in-out infinite;
  }

  .wave-surface::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 3px;
    background: rgba(147, 197, 253, 0.6);
    border-radius: 50%;
    animation: waveGlow 2s ease-in-out infinite;
  }

  .k-letter {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 40px;
    font-weight: 700;
    color: #fff;
    z-index: 2;
    text-shadow: 0 2px 12px rgba(0,0,0,0.3);
    mix-blend-mode: overlay;
    opacity: 0.9;
  }

  .wave-ring {
    position: absolute;
    bottom: -12px;
    left: 50%;
    transform: translateX(-50%);
    width: 20px;
    height: 20px;
    border-radius: 50%;
    border: 2px solid rgba(37, 99, 235, 0.2);
    animation: ringExpand 2s ease-out infinite;
  }

  .percentage {
    font-size: 32px;
    font-weight: 300;
    color: #2563eb;
    font-variant-numeric: tabular-nums;
    letter-spacing: -1px;
  }

  .percentage span {
    display: inline-block;
    animation: countUp 3s steps(1) infinite;
  }

  .pips {
    display: flex;
    gap: 4px;
  }

  .pip {
    width: 4px;
    border-radius: 2px;
    background: rgba(37, 99, 235, 0.15);
    animation: pipGrow 1.5s ease-in-out infinite;
  }
  .pip:nth-child(1) { height: 8px; animation-delay: 0s; }
  .pip:nth-child(2) { height: 12px; animation-delay: 0.1s; }
  .pip:nth-child(3) { height: 16px; animation-delay: 0.2s; }
  .pip:nth-child(4) { height: 20px; animation-delay: 0.3s; }
  .pip:nth-child(5) { height: 24px; animation-delay: 0.4s; }
  .pip:nth-child(6) { height: 20px; animation-delay: 0.5s; }
  .pip:nth-child(7) { height: 16px; animation-delay: 0.6s; }
  .pip:nth-child(8) { height: 12px; animation-delay: 0.7s; }
  .pip:nth-child(9) { height: 8px; animation-delay: 0.8s; }

  .pip.active {
    background: linear-gradient(to top, #2563eb, #60a5fa);
    animation: pipGrow 0s;
  }

  .label {
    color: #64748b;
    font-size: 12px;
    letter-spacing: 3px;
    text-transform: uppercase;
  }

  @keyframes fillUp {
    0% { height: 0%; }
    25% { height: 35%; }
    50% { height: 60%; }
    75% { height: 82%; }
    100% { height: 95%; }
  }

  @keyframes waveRipple {
    0%, 100% { transform: translateX(0) scaleY(1); }
    50% { transform: translateX(-10%) scaleY(1.3); }
  }

  @keyframes waveGlow {
    0%, 100% { opacity: 0.5; }
    50% { opacity: 1; }
  }

  @keyframes ringExpand {
    0% { transform: translateX(-50%) scale(0.8); opacity: 0.6; }
    100% { transform: translateX(-50%) scale(3); opacity: 0; }
  }

  @keyframes pipGrow {
    0%, 100% { transform: scaleY(0.5); opacity: 0.3; }
    50% { transform: scaleY(1); opacity: 1; }
  }

  @keyframes countUp {
    0% { content: "0"; }
  }
</style>
</head>
<body>
  <div class="loader">
    <div class="wave-box">
      <div class="wave-fill">
        <div class="wave-surface"></div>
      </div>
      <div class="k-letter">K</div>
      <div class="wave-ring"></div>
    </div>
    <div class="percentage">87%</div>
    <div class="pips">
      <span class="pip"></span><span class="pip"></span>
      <span class="pip"></span><span class="pip"></span>
      <span class="pip"></span><span class="pip"></span>
      <span class="pip"></span><span class="pip"></span>
      <span class="pip"></span>
    </div>
    <div class="label">Loading resources</div>
  </div>
</body>
</html>
