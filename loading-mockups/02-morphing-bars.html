<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Loading — Morphing Bars</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #0f172a;
    font-family: system-ui, -apple-system, sans-serif;
  }

  .loader {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 40px;
  }

  .bars-container {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    height: 80px;
  }

  .bar {
    width: 8px;
    border-radius: 4px;
    background: linear-gradient(to top, #2563eb, #60a5fa);
    animation: barMorph 2.4s ease-in-out infinite;
  }
  .bar:nth-child(1) { height: 24px; animation-delay: 0s; }
  .bar:nth-child(2) { height: 40px; animation-delay: 0.15s; }
  .bar:nth-child(3) { height: 56px; animation-delay: 0.3s; }
  .bar:nth-child(4) { height: 72px; animation-delay: 0.45s; }
  .bar:nth-child(5) { height: 80px; animation-delay: 0.6s; }
  .bar:nth-child(6) { height: 72px; animation-delay: 0.75s; }
  .bar:nth-child(7) { height: 56px; animation-delay: 0.9s; }
  .bar:nth-child(8) { height: 40px; animation-delay: 1.05s; }
  .bar:nth-child(9) { height: 24px; animation-delay: 1.2s; }

  .bar-glow {
    position: relative;
  }
  .bar-glow::after {
    content: '';
    position: absolute;
    inset: -4px;
    background: radial-gradient(ellipse, rgba(37,99,235,0.3), transparent 70%);
    border-radius: 50%;
    top: 100%;
    height: 12px;
  }

  .morph-hint {
    display: flex;
    align-items: center;
    gap: 16px;
    color: #64748b;
    font-size: 13px;
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  .morph-track {
    width: 160px;
    height: 3px;
    background: rgba(37, 99, 235, 0.15);
    border-radius: 2px;
    overflow: hidden;
  }

  .morph-fill {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, #2563eb, #60a5fa);
    border-radius: 2px;
    animation: fillBar 2.4s ease-in-out infinite;
  }

  @keyframes barMorph {
    0%, 100% {
      transform: scaleY(0.3);
      opacity: 0.4;
      background: linear-gradient(to top, #2563eb, #60a5fa);
    }
    50% {
      transform: scaleY(1);
      opacity: 1;
      background: linear-gradient(to top, #60a5fa, #93c5fd);
      box-shadow: 0 0 16px rgba(37, 99, 235, 0.4);
    }
  }

  @keyframes fillBar {
    0% { width: 0%; }
    50% { width: 75%; }
    100% { width: 100%; }
  }

  .pulse-dot {
    width: 6px;
    height: 6px;
    background: #2563eb;
    border-radius: 50%;
    animation: pulseDot 1s ease-in-out infinite;
  }

  @keyframes pulseDot {
    0%, 100% { transform: scale(1); opacity: 1; }
    50% { transform: scale(1.6); opacity: 0.3; }
  }
</style>
</head>
<body>
  <div class="loader">
    <div class="bars-container">
      <div class="bar"></div><div class="bar"></div><div class="bar"></div>
      <div class="bar"></div><div class="bar bar-glow"></div>
      <div class="bar"></div><div class="bar"></div><div class="bar"></div>
      <div class="bar"></div>
    </div>
    <div class="morph-hint">
      <span class="pulse-dot"></span>
      <span>Preparing workspace</span>
    </div>
    <div class="morph-track">
      <div class="morph-fill"></div>
    </div>
  </div>
</body>
</html>
