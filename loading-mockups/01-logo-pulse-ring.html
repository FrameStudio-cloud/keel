<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Loading — Logo Pulse + Ring</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #0f172a;
    font-family: system-ui, -apple-system, sans-serif;
  }

  .loader {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 32px;
  }

  .logo-ring {
    position: relative;
    width: 96px;
    height: 96px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .logo {
    font-size: 40px;
    font-weight: 700;
    color: #2563eb;
    letter-spacing: -2px;
    z-index: 2;
    animation: logoPulse 1.8s ease-in-out infinite;
  }

  .ring {
    position: absolute;
    inset: 0;
    border-radius: 50%;
    border: 3px solid transparent;
    border-top-color: #2563eb;
    border-right-color: #60a5fa;
    animation: ringSpin 1.2s cubic-bezier(0.45, 0, 0.35, 1) infinite;
  }

  .ring-dash {
    position: absolute;
    inset: -8px;
    border-radius: 50%;
    border: 2px solid transparent;
    border-bottom-color: rgba(37, 99, 235, 0.25);
    border-left-color: rgba(96, 165, 250, 0.4);
    animation: ringSpin 2s cubic-bezier(0.65, 0, 0.35, 1) infinite reverse;
  }

  .logo-dot {
    position: absolute;
    width: 8px;
    height: 8px;
    background: #60a5fa;
    border-radius: 50%;
    top: 4px;
    animation: dotOrbit 1.8s ease-in-out infinite;
    box-shadow: 0 0 12px rgba(37, 99, 235, 0.6);
  }

  .progress-text {
    color: #94a3b8;
    font-size: 14px;
    letter-spacing: 4px;
    text-transform: uppercase;
    font-weight: 500;
    animation: textFade 2s ease-in-out infinite;
  }

  .progress-dots {
    display: flex;
    gap: 8px;
  }

  .progress-dots span {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #2563eb;
    animation: dotBounce 1.4s ease-in-out infinite;
  }
  .progress-dots span:nth-child(2) { animation-delay: 0.2s; }
  .progress-dots span:nth-child(3) { animation-delay: 0.4s; }
  .progress-dots span:nth-child(4) { animation-delay: 0.6s; }
  .progress-dots span:nth-child(5) { animation-delay: 0.8s; }

  @keyframes logoPulse {
    0%, 100% { transform: scale(1); opacity: 1; }
    50% { transform: scale(1.08); opacity: 0.85; }
  }

  @keyframes ringSpin {
    to { transform: rotate(360deg); }
  }

  @keyframes dotOrbit {
    0%, 100% { transform: rotate(0deg) translateX(44px) rotate(0deg); }
    50% { transform: rotate(180deg) translateX(44px) rotate(-180deg); }
  }

  @keyframes textFade {
    0%, 100% { opacity: 0.5; }
    50% { opacity: 1; }
  }

  @keyframes dotBounce {
    0%, 80%, 100% { transform: scale(0.4); opacity: 0.3; }
    40% { transform: scale(1); opacity: 1; }
  }
</style>
</head>
<body>
  <div class="loader">
    <div class="logo-ring">
      <span class="logo-dot"></span>
      <div class="ring"></div>
      <div class="ring-dash"></div>
      <span class="logo">Keel</span>
    </div>
    <div class="progress-dots">
      <span></span><span></span><span></span><span></span><span></span>
    </div>
    <div class="progress-text">Loading</div>
  </div>
</body>
</html>
