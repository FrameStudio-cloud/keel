<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Loading — Card Stack Flip</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #0f172a;
    font-family: system-ui, -apple-system, sans-serif;
  }

  .loader {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 36px;
  }

  .stack {
    position: relative;
    width: 120px;
    height: 80px;
    perspective: 600px;
  }

  .card {
    position: absolute;
    inset: 0;
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 0.5px;
    backface-visibility: hidden;
    transform-origin: center;
  }

  .card-1 {
    background: linear-gradient(135deg, #1e40af, #2563eb);
    color: #fff;
    z-index: 5;
    animation: cardFlip1 4s ease-in-out infinite;
    box-shadow: 0 4px 24px rgba(37, 99, 235, 0.3);
  }

  .card-2 {
    background: linear-gradient(135deg, #1d4ed8, #3b82f6);
    color: #fff;
    z-index: 4;
    animation: cardFlip2 4s ease-in-out infinite;
    box-shadow: 0 4px 20px rgba(37, 99, 235, 0.2);
  }

  .card-3 {
    background: linear-gradient(135deg, #2563eb, #60a5fa);
    color: #fff;
    z-index: 3;
    animation: cardFlip3 4s ease-in-out infinite;
    box-shadow: 0 4px 20px rgba(37, 99, 235, 0.15);
  }

  .card-icon {
    font-size: 22px;
    margin-right: 6px;
    opacity: 0.8;
  }

  .progress-bar {
    width: 200px;
    height: 4px;
    background: rgba(37, 99, 235, 0.1);
    border-radius: 2px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, #2563eb, #60a5fa, #93c5fd);
    border-radius: 2px;
    animation: progressFill 4s ease-in-out infinite;
  }

  .step-label {
    display: flex;
    align-items: center;
    gap: 10px;
    color: #64748b;
    font-size: 13px;
    letter-spacing: 1px;
  }

  .step-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: #2563eb;
    animation: stepPulse 0.8s ease-in-out infinite;
  }

  .step-text {
    animation: stepSlide 4s ease-in-out infinite;
  }

  @keyframes cardFlip1 {
    0%, 15% { transform: translateY(0) scale(1); opacity: 1; }
    25%, 40% { transform: translateY(-40px) scale(1.02); opacity: 1; }
    50%, 65% { transform: translateY(-80px) scale(0.95); opacity: 0.6; }
    75%, 100% { transform: translateY(0) scale(1); opacity: 1; }
  }

  @keyframes cardFlip2 {
    0%, 15% { transform: translateY(0) scale(0.95); opacity: 0.5; }
    25%, 40% { transform: translateY(0) scale(1); opacity: 1; }
    50%, 65% { transform: translateY(-40px) scale(1.02); opacity: 1; }
    75%, 100% { transform: translateY(-80px) scale(0.95); opacity: 0.6; }
  }

  @keyframes cardFlip3 {
    0%, 15% { transform: translateY(-80px) scale(0.95); opacity: 0.6; }
    25%, 40% { transform: translateY(0) scale(0.95); opacity: 0.5; }
    50%, 65% { transform: translateY(0) scale(1); opacity: 1; }
    75%, 100% { transform: translateY(-40px) scale(1.02); opacity: 1; }
  }

  @keyframes progressFill {
    0% { width: 0%; }
    25% { width: 30%; }
    50% { width: 55%; }
    75% { width: 80%; }
    100% { width: 100%; }
  }

  @keyframes stepPulse {
    0%, 100% { transform: scale(1); opacity: 1; }
    50% { transform: scale(1.5); opacity: 0.4; }
  }

  @keyframes stepSlide {
    0%, 20% { content: "Connecting"; }
    25%, 45% { content: "Loading"; }
    50%, 70% { content: "Almost ready"; }
    75%, 100% { content: "Done"; }
  }

  .logo-bottom {
    font-size: 16px;
    font-weight: 700;
    color: #334155;
    letter-spacing: 2px;
  }
</style>
</head>
<body>
  <div class="loader">
    <div class="stack">
      <div class="card card-1">
        <span class="card-icon">📊</span> Sync
      </div>
      <div class="card card-2">
        <span class="card-icon">📦</span> Inventory
      </div>
      <div class="card card-3">
        <span class="card-icon">📈</span> Reports
      </div>
    </div>

    <div class="progress-bar">
      <div class="progress-fill"></div>
    </div>

    <div class="step-label">
      <span class="step-dot"></span>
      <span class="step-text">Connecting</span>
    </div>
  </div>
</body>
</html>
